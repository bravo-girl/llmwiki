<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#132a24" />
    <meta name="description" content="Ein lebendes, dateibasiertes LLM-Wiki" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>LLM Wiki</title>
  </head>
  <body>
    <main class="shell">
      <header>
        <div class="mark">LW</div>
        <div>
          <p class="eyebrow">Lebende Wissensbasis</p>
          <h1>Frag das Wiki.</h1>
        </div>
      </header>

      <section class="intro">
        <p>Jede gute Frage kann die Markdown-Wissensbasis dauerhaft verbessern.</p>
        <p class="notice">Fragen und daraus gewonnenes Wissen können öffentlich im GitHub-Repository gespeichert werden. Bitte keine persönlichen oder vertraulichen Daten eingeben.</p>
      </section>

      <aside id="maintenance-warning" class="maintenance-warning" hidden role="status"></aside>

      <form id="ask-form">
        <label for="question">Deine Frage</label>
        <textarea id="question" name="question" rows="5" maxlength="4000" required placeholder="Was möchtest du verstehen?"></textarea>
        <button type="submit">Frage stellen</button>
      </form>

      <section id="result" class="result" hidden aria-live="polite">
        <p id="status" class="status"></p>
        <div id="answer"></div>
        <div id="meta" class="meta"></div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
